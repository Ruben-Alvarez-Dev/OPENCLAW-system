    namespace: /hosteleria

  ACA:
    codigo: "ACA"
    nombre: "Académico"
    nivel: ESP
    descripcion: "Oposiciones, estudio, tutoría"
    jefe: CON
    namespace: /academico

  GEN:
    codigo: "GEN"
    nombre: "General"
    nivel: ESP
    descripcion: "Consultas generales, ayuda"
    jefe: CON
    namespace: /general

  CRI:
    codigo: "CRI"
    nombre: "Criptomonedas"
    nivel: ESP
    descripcion: "Blockchain, crypto, DeFi"
    jefe: REX
    namespace: /crypto

  FIN:
    codigo: "FIN"
    nombre: "Finanzas"
    nivel: ESP
    descripcion: "Inversiones, mercados"
