# Mapa de Códigos de Serialización

**ID:** SIS-BIB-REG-003-mapa_codigos
**Nivel:** Sistema
**Dominio:** Biblioteca
**Tipo:** Registro
**Versión:** 2.1.0
**Actualizado:** 2026-03-09

# ===========================================
# FORMATO DE ID
# ===========================================
#
#   LLL-DDD-TTT-SSS-nombre_descriptivo
#   │││ │││ │││ └─── SSS: Secuencia (001-999)
#   │││ │││ ││└──── TTT: Tipo (3 letras español, MAYÚSCULAS)
#   │││ │││ └────── DDD: Dominio (3 letras español, MAYÚSCULAS)
#   │││ └────────── LLL: Nivel (3 letras español, MAYÚSCULAS)
#   └────────────── nombre_descriptivo: Minúsculas con guiones bajos
#
#   Ejemplo: ESP-DES-HER-001-herramientas
#            │││ │││ │││ │││  └── nombre: herramientas
#            │││ │││ │││ └──── secuencia: 001
#            │││ │││ └─────── tipo: HER (herramientas)
#            │││ └─────────── dominio: DES (desarrollo)
#            └─────────────── nivel: ESP (especialista)
#
# ===========================================

# ===========================================
# NIVELES (LLL)
# ===========================================

niveles:
  SIS:
    codigo: "SIS"
    nombre: "Sistema"
    descripcion: "Nivel 0 - Configuración global, protocolos, plantillas"
    nivel: 0

  JEF:
    codigo: "JEF"
    nombre: "Jefatura"
    descripcion: "Nivel 1 - Jefes de dominio (Catedráticos)"
    nivel: 1

  ESP:
    codigo: "ESP"
    nombre: "Especialista"
    descripcion: "Nivel 2 - Unidades especializadas tri-agente"
    nivel: 2

  SUB:
    codigo: "SUB"
    nombre: "Subagente"
    descripcion: "Nivel 3 - Agentes efímeros temporales"
    nivel: 3

# ===========================================
# DOMINIOS (DDD)
# ===========================================

dominios:
  # Sistema
  SMA:
    codigo: "SMA"
    nombre: "Sistema"
    nivel: SIS
    descripcion: "Configuración del sistema"

  BIB:
    codigo: "BIB"
    nombre: "Biblioteca"
    nivel: SIS
    descripcion: "Protocolos, plantillas, registros"

  # Jefaturas
  CON:
    codigo: "CON"
    nombre: "Conocimiento"
    nivel: JEF
    descripcion: "Jefe de Conocimiento"
    dominios_dependientes: [ACA, GEN]

  ING:
    codigo: "ING"
    nombre: "Ingeniería"
    nivel: JEF
    descripcion: "Jefe de Ingeniería"
    dominios_dependientes: [DES, INF]

  OPE:
    codigo: "OPE"
    nombre: "Operaciones"
    nivel: JEF
    descripcion: "Jefe de Operaciones"
    dominios_dependientes: [HOS]

  RHU:
    codigo: "RHU"
    nombre: "Recursos Humanos"
    nivel: JEF
    descripcion: "Jefe de Recursos Humanos"
    dominios_dependientes: [DEP]

  REX:
    codigo: "REX"
    nombre: "Relaciones Externas"
    nivel: JEF
    descripcion: "Jefe de Relaciones Externas"
    dominios_dependientes: [CRI, FIN]

  COM:
    codigo: "COM"
    nombre: "Comunicación"
    nivel: JEF
    descripcion: "Jefe de Comunicación"
    dominios_dependientes: [IDI]

  # Especialistas
  DES:
    codigo: "DES"
    nombre: "Desarrollo"
    nivel: ESP
    descripcion: "Desarrollo de software, arquitectura"
