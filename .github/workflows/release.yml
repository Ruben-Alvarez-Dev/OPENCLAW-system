name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          tar -czvf openclaw-system-${{ steps.get_version.outputs.VERSION }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.DS_Store' \
            .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: openclaw-system-${{ steps.get_version.outputs.VERSION }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-archive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: openclaw-system-${{ steps.get_version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
          body: |
            ## Release ${{ steps.get_version.outputs.VERSION }}

            ### Changes
            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ### Installation
            ```bash
            tar -xzvf openclaw-system-${{ steps.get_version.outputs.VERSION }}.tar.gz
            cd openclaw-system
            cp config/openclaw.json.example config/openclaw.json
            # Edit configuration as needed
            ```
