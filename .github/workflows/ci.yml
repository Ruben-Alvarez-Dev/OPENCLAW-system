name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g yaml-lint
          npm install -g markdownlint-cli

      - name: Lint YAML files
        run: |
          find . -name "*.yaml" -o -name "*.yml" | grep -v node_modules | xargs yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable}}"

      - name: Lint Markdown files
        run: |
          markdownlint '**/*.md' --ignore node_modules

  validate-profiles:
    name: Validate Profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Validate YAML syntax
        run: |
          python -c "
          import yaml
          import sys
          import os
          from pathlib import Path

          errors = []
          profiles_dir = Path('profiles/library/specialists')
          if profiles_dir.exists():
              for f in profiles_dir.glob('*.yaml'):
                  try:
                      with open(f) as file:
                          yaml.safe_load(file)
                      print(f'✅ {f}')
                  except Exception as e:
                      errors.append(f'{f}: {e}')
                      print(f'❌ {f}: {e}')

          if errors:
              sys.exit(1)
          "

      - name: Validate required fields
        run: |
          python -c "
          import yaml
          import sys
          from pathlib import Path

          REQUIRED_FIELDS = ['id', 'name', 'namespace', 'version', 'status', 'chief', 'manager', 'worker', 'archivist']

          errors = []
          profiles_dir = Path('profiles/library/specialists')
          if profiles_dir.exists():
              for f in profiles_dir.glob('*.yaml'):
                  with open(f) as file:
                      profile = yaml.safe_load(file)

                  missing = [f for f in REQUIRED_FIELDS if f not in profile]
                  if missing:
                      errors.append(f'{f}: missing {missing}')
                      print(f'❌ {f}: missing {missing}')
                  else:
                      print(f'✅ {f}: all required fields present')

          if errors:
              sys.exit(1)
          "

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          echo "Checking for potential secrets..."
          ! grep -r -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]+['\"]" --include="*.yaml" --include="*.yml" --include="*.json" --include="*.md" . || (echo "Found potential secrets!" && exit 1)

      - name: Check for forbidden patterns
        run: |
          echo "Checking for forbidden patterns..."
          ! grep -r "rm -rf /" --include="*.yaml" --include="*.md" . || (echo "Found forbidden patterns!" && exit 1)

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken internal links
        run: |
          python -c "
          import os
          import re
          from pathlib import Path

          def find_markdown_links(content):
              pattern = r'\[([^\]]+)\]\(([^)]+)\)'
              return re.findall(pattern, content)

          broken = []
          docs_dir = Path('docs')

          if docs_dir.exists():
              for md_file in docs_dir.rglob('*.md'):
                  with open(md_file) as f:
                      content = f.read()

                  for text, link in find_markdown_links(content):
                      if link.startswith('http') or link.startswith('#'):
                          continue

                      # Resolve relative path
                      target = (md_file.parent / link).resolve()
                      if not target.exists():
                          broken.append(f'{md_file}: {link}')
                          print(f'❌ {md_file}: {link}')

          if broken:
              print(f'Found {len(broken)} broken links')
          else:
              print('✅ No broken internal links found')
          "
